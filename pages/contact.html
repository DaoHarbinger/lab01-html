<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | Федоренко Олександр</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../js/main.js" defer></script>
</head>
<body>
    <div class="site-header">
        <div class="container header-container">
            <div class="logo"><a href="../index.html">Олександр Федоренко</a></div>
            <button class="menu-toggle" id="menuToggle" aria-label="Меню">☰</button>
            <nav id="mainNav">
                <ul class="nav-list">
                    <li><a href="../index.html">Головна</a></li>
                    <li><a href="about.html">Про мене</a></li>
                    <li><a href="contact.html">Контакти</a></li>
                </ul>
            </nav>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </div>

    <main>
        <div class="container">
            <h1>Зв'яжіться зі мною</h1>
            <p>Заповніть форму нижче. Поля з <strong>*</strong> обов'язкові.</p>

            <div class="form-card">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Ім'я *</label>
                        <input type="text" id="name" name="name" required minlength="2" maxlength="30" placeholder="Олександр">
                        <div class="error-message" id="nameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required placeholder="oleksandr@example.com">
                        <div class="error-message" id="emailError"></div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+380501234567">
                    </div>
                    <div class="form-group">
                        <label for="topic">Тема *</label>
                        <select id="topic" name="topic" required>
                            <option value="">Оберіть тему</option>
                            <option value="study">Навчання</option>
                            <option value="work">Співпраця</option>
                            <option value="other">Інше</option>
                        </select>
                    </div>
                    <fieldset>
                        <legend>Зручний спосіб зв'язку</legend>
                        <div class="radio-group">
                            <label><input type="radio" name="contactWay" value="email" checked> Email</label>
                            <label><input type="radio" name="contactWay" value="phone"> Телефон</label>
                        </div>
                    </fieldset>
                    <div class="form-group">
                        <label for="message">Повідомлення *</label>
                        <textarea id="message" name="message" rows="5" required minlength="10" maxlength="300" placeholder="Ваше повідомлення..."></textarea>
                        <div class="char-counter"><span id="charCount">0</span> / 300 символів</div>
                        <div class="error-message" id="messageError"></div>
                    </div>
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" name="agree" required> Погоджуюсь з правилами *
                        </label>
                    </div>
                    <div class="form-group">
                        <button type="submit">Надіслати</button>
                        <button type="reset">Очистити</button>
                    </div>
                </form>
                <div id="formStatus"></div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Федоренко Олександр, група 232/1</p>
        </div>
    </footer>

    <button id="backToTop" class="back-to-top">⬆</button>
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img id="modalImg" src="" alt="Збільшене зображення">
        </div>
    </div>
</body>
</html>
